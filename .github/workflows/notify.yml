name: Task Alert Bot

on:
  schedule:
    # 朝9時 JST（UTC 00:00）月〜土
    - cron: '0 0 * * 1-6'
    # 12時 JST（UTC 03:00）月〜土
    - cron: '0 3 * * 1-6'
    # 16時 JST（UTC 07:00）月〜土
    - cron: '0 7 * * 1-6'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード (morning / followup)'
        required: false
        default: 'morning'

permissions:
  id-token: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/980331688055/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'task-alert-bot@ai-company-489807.iam.gserviceaccount.com'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.run_mode || 'morning' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1-6" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=followup" >> $GITHUB_OUTPUT
          fi

      - name: Run alert bot
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          RUN_MODE: ${{ steps.mode.outputs.mode }}
          ENABLE_MENTIONS: ${{ secrets.ENABLE_MENTIONS }}
        run: python main.py
